title: "My Superb Portfolio"
description: "Portfolio of Bhanu Prakash Vangala"

# Minimal Mistakes Remote Theme
remote_theme: "mmistakes/minimal-mistakes"

plugins:
  - jekyll-remote-theme

minimal_mistakes_skin: "default"  # or choose "air", "dark", etc.

author:
  name: "Bhanu Prakash Vangala"
  avatar: "/assets/images/avatar.jpg"
  bio: "PhD candidate in Computer Science, focusing on NLP and ML."

defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: true

# For a user site, baseurl should be empty
baseurl: ""
# The URL is your live website
url: "https://bhanuprakashvangala.github.io"
